<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH PAGE -->
  <div id="auth-section">
    <div class="auth-wrapper">
      <div class="auth-brand">
        <div class="brand-icon">✓</div>
        <h1>TaskFlow</h1>
        <p>Stay on top of everything</p>
      </div>

      <!-- Login -->
      <div class="auth-card" id="login-box">
        <h2>Welcome back</h2>
        <p class="auth-sub">Sign in to your account</p>
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" />
        </div>
        <p id="login-error" class="error"></p>
        <button class="btn-primary btn-full" onclick="login()">Sign In</button>
        <p class="auth-switch">Don't have an account? <a href="#" onclick="toggleAuth()">Register</a></p>
      </div>

      <!-- Register -->
      <div class="auth-card hidden" id="register-box">
        <h2>Create account</h2>
        <p class="auth-sub">Get started for free</p>
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="Choose a username" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Create a password" />
        </div>
        <p id="reg-error" class="error"></p>
        <button class="btn-primary btn-full" onclick="register()">Create Account</button>
        <p class="auth-switch">Already have an account? <a href="#" onclick="toggleAuth()">Sign in</a></p>
      </div>
    </div>
  </div>

  <!-- TASKS PAGE -->
  <div id="task-section" class="hidden">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-inner">
        <div class="nav-brand">
          <span class="brand-icon-sm">✓</span>
          <span>TaskFlow</span>
        </div>
        <div class="nav-right">
          <span id="welcome-msg" class="nav-user"></span>
          <button class="btn-outline-sm" onclick="logout()">Logout</button>
        </div>
      </div>
    </nav>

    <div class="page-content">

      <!-- Stats bar -->
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="stat-pending">0</span>
          <span class="stat-label">Pending</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="stat-done">0</span>
          <span class="stat-label">Completed</span>
        </div>
      </div>

      <!-- Add Task -->
      <div class="add-task-card">
        <h3>Add New Task</h3>
        <div class="add-task-row">
          <div class="form-group flex-1">
            <input type="text" id="task-title" placeholder="What needs to be done?" />
          </div>
          <div class="form-group flex-2">
            <input type="text" id="task-desc" placeholder="Description (optional)" />
          </div>
          <button class="btn-primary" onclick="createTask()">+ Add</button>
        </div>
        <p id="task-error" class="error"></p>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button onclick="loadTasks(null)" id="filter-all" class="tab active">All Tasks</button>
        <button onclick="loadTasks(false)" id="filter-pending" class="tab">Pending</button>
        <button onclick="loadTasks(true)" id="filter-done" class="tab">Completed</button>
      </div>

      <!-- Task list -->
      <div id="task-list"></div>

      <!-- Pagination -->
      <div id="pagination" class="pagination"></div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
